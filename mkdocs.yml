site_name: Study Log & Blog
site_description: 학습한 내용을 기록하고 공유하는 기술 블로그입니다.
site_author: kim-hyunjin
site_url: https://kim-hyunjin.github.io/study/

# docs_dir: docs (default)
exclude_docs: |
  .git/*
  .github/*
  node_modules/*
  venv/*
  build/*
  site/*
  *.exe
  *.lock
  Pipfile*
  package-lock.json
  uv.lock
  **/*.py
  **/*.kt
  **/*.rs
  **/*.go
  **/*.js
  **/*.ts
  **/*.java
  **/*.sql
  **/*.gradle
  **/*.xml

theme:
  name: material
  language: ko
  # ... (기타 설정)
  validation:
    omitted: warn
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - roamlinks
  - mermaid2
  - awesome-pages:
      collapse_single_pages: true
  - blog:
      post_dir: .
      post_url_format: "{categories}/{title}"
      post_readtime: true
      post_excerpt: optional
      archive: true
      categories: true
      tags: true
  - mkdocs-jupyter:
      execute: false
      ignore: ["*.ipynb_checkpoints/*"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
