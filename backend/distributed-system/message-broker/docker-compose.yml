services:
  kafka-1:
    image: dhi.io/kafka:4
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_CLUSTER_ID: N8I8yv19T4aEDiDqF5UanA
    volumes:
      - kafka-1-data:/opt/kafka/logs
      - ./config/kafka-1.properties:/opt/kafka/config/server.properties
    networks:
      - kafka-net

  kafka-2:
    image: dhi.io/kafka:4
    container_name: kafka-2
    ports:
      - "9093:9092"
    environment:
      KAFKA_CLUSTER_ID: N8I8yv19T4aEDiDqF5UanA
    volumes:
      - kafka-2-data:/opt/kafka/logs
      - ./config/kafka-2.properties:/opt/kafka/config/server.properties
    networks:
      - kafka-net

  kafka-3:
    image: dhi.io/kafka:4
    container_name: kafka-3
    ports:
      - "9094:9092"
    environment:
      KAFKA_CLUSTER_ID: N8I8yv19T4aEDiDqF5UanA
    volumes:
      - kafka-3-data:/opt/kafka/logs
      - ./config/kafka-3.properties:/opt/kafka/config/server.properties
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
