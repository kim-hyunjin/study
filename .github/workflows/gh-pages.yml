name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and Deploy
        run: |
          # MkDocs build expects a docs directory by default. 
          # We use the current directory as docs_dir in mkdocs.yml, but 
          # gh-deploy might need some adjustments or we can build and push.
          mkdocs gh-deploy --force
